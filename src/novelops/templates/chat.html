<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NovelOps - 智能助手</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; height: 100vh; display: flex; flex-direction: column; background: #f7f7f5; color: #202124; }
    
    header { background: #1f2933; color: white; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; }
    header nav a { color: white; margin-right: 18px; text-decoration: none; font-size: 14px; }
    header nav a:hover { text-decoration: underline; }
    
    .chat-container { flex: 1; display: flex; flex-direction: column; max-width: 900px; width: 100%; margin: 0 auto; padding: 16px; }
    
    .messages-area { flex: 1; overflow-y: auto; padding: 20px 0; }
    
    .message { margin-bottom: 20px; display: flex; gap: 12px; }
    .message.user { flex-direction: row-reverse; }
    
    .message-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .message.user .message-avatar { background: #0f5f74; color: white; }
    .message.assistant .message-avatar { background: #e5e7eb; color: #374151; }
    
    .message-content { max-width: 75%; padding: 12px 16px; border-radius: 12px; line-height: 1.6; font-size: 15px; }
    .message.user .message-content { background: #0f5f74; color: white; border-bottom-right-radius: 4px; }
    .message.assistant .message-content { background: white; border: 1px solid #e5e7eb; border-bottom-left-radius: 4px; }
    
    .message-content pre { background: #f3f4f6; padding: 10px; border-radius: 6px; margin-top: 8px; overflow-x: auto; font-size: 13px; }
    .message-content code { font-family: "SF Mono", Monaco, monospace; }
    
    .quick-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .quick-action { background: white; border: 1px solid #d1d5db; border-radius: 20px; padding: 8px 16px; font-size: 13px; cursor: pointer; transition: all 0.2s; }
    .quick-action:hover { background: #f3f4f6; border-color: #9ca3af; }
    
    .input-area { background: white; border: 1px solid #d1d5db; border-radius: 12px; padding: 12px; margin-top: 8px; }
    .input-row { display: flex; gap: 8px; align-items: flex-end; }
    .input-row textarea { flex: 1; border: none; outline: none; resize: none; font-size: 15px; line-height: 1.5; max-height: 150px; font-family: inherit; }
    .input-row button { background: #0f5f74; color: white; border: none; border-radius: 8px; padding: 10px 20px; cursor: pointer; font-size: 15px; white-space: nowrap; }
    .input-row button:hover { background: #0d4f61; }
    .input-row button:disabled { background: #9ca3af; cursor: not-allowed; }
    
    .input-hint { font-size: 12px; color: #6b7280; margin-top: 8px; text-align: center; }
    
    .confirmation-actions { margin-top: 12px; display: flex; gap: 8px; }
    .confirmation-actions button { padding: 8px 16px; font-size: 13px; }
    .btn-confirm { background: #059669; }
    .btn-confirm:hover { background: #047857; }
    .btn-cancel { background: #6b7280; }
    .btn-cancel:hover { background: #4b5563; }
    
    .task-progress { margin-top: 12px; padding: 12px; background: #f0f9ff; border-radius: 8px; border: 1px solid #bae6fd; }
    .task-progress .progress-bar { height: 6px; background: #e0f2fe; border-radius: 3px; margin-top: 8px; overflow: hidden; }
    .task-progress .progress-bar-fill { height: 100%; background: #0ea5e9; transition: width 0.3s; }
    .task-progress .progress-text { font-size: 13px; color: #0369a1; }
    
    .loading-dots { display: inline-flex; gap: 4px; }
    .loading-dots span { width: 8px; height: 8px; background: #9ca3af; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
    .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
    .loading-dots span:nth-child(2) { animation-delay: -0.16s; }
    @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    
    .welcome-message { text-align: center; padding: 40px 20px; color: #6b7280; }
    .welcome-message h2 { color: #1f2937; margin-bottom: 12px; }
    .welcome-message p { margin-bottom: 8px; }
  </style>
</head>
<body>
  <header>
    <nav>
      <a href="/">项目</a>
      <a href="/projects">项目列表</a>
      <a href="/chat" style="font-weight: 600;">智能助手</a>
      <a href="/revision-queue">修订队列</a>
    </nav>
    <div>
      <form method="post" action="/logout" style="display: inline;">
        <button type="submit" style="background: transparent; border: 1px solid white; padding: 6px 12px; font-size: 13px;">退出</button>
      </form>
    </div>
  </header>
  
  <div class="chat-container">
    <div class="quick-actions">
      <button class="quick-action" onclick="sendQuickAction('查看项目状态')">查看项目状态</button>
      <button class="quick-action" onclick="sendQuickAction('生成下一章')">生成下一章</button>
      <button class="quick-action" onclick="sendQuickAction('采集市场热点')">采集市场热点</button>
      <button class="quick-action" onclick="sendQuickAction('分析市场数据')">分析市场数据</button>
      <button class="quick-action" onclick="sendQuickAction('运行生成流水线')">运行流水线</button>
      <button class="quick-action" onclick="sendQuickAction('准备新书项目')">准备新书项目</button>
      <button class="quick-action" onclick="sendQuickAction('查看修订队列')">修订队列</button>
    </div>
    
    <div class="messages-area" id="messagesArea">
      <div class="welcome-message">
        <h2>NovelOps 智能助手</h2>
        <p>用自然语言描述你的需求，我来帮你完成。</p>
        <p>例如：「查看项目状态」「生成下一章」「采集番茄小说热门榜单」</p>
      </div>
    </div>
    
    <div class="input-area">
      <div class="input-row">
        <textarea id="messageInput" rows="1" placeholder="输入你的需求..." onkeydown="handleKeyDown(event)"></textarea>
        <button id="sendButton" onclick="sendMessage()">发送</button>
      </div>
      <div class="input-hint">按 Enter 发送，Shift + Enter 换行</div>
    </div>
  </div>
  
  <script>
    let sessionId = null;
    let currentTaskId = null;
    let eventSource = null;
    
    const messagesArea = document.getElementById('messagesArea');
    const messageInput = document.getElementById('messageInput');
    const sendButton = document.getElementById('sendButton');
    
    messageInput.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 150) + 'px';
    });
    
    function handleKeyDown(event) {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    }
    
    function addMessage(role, content, metadata = {}) {
      const welcomeMsg = messagesArea.querySelector('.welcome-message');
      if (welcomeMsg) welcomeMsg.remove();
      
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${role}`;
      
      const avatar = document.createElement('div');
      avatar.className = 'message-avatar';
      avatar.textContent = role === 'user' ? '👤' : '🤖';
      
      const contentDiv = document.createElement('div');
      contentDiv.className = 'message-content';
      contentDiv.textContent = content;
      
      if (metadata.requires_confirmation) {
        const actionsDiv = document.createElement('div');
        actionsDiv.className = 'confirmation-actions';
        
        const confirmBtn = document.createElement('button');
        confirmBtn.className = 'btn-confirm';
        confirmBtn.textContent = '确认执行';
        confirmBtn.onclick = () => executeConfirmed();
        
        const cancelBtn = document.createElement('button');
        cancelBtn.className = 'btn-cancel';
        cancelBtn.textContent = '取消';
        cancelBtn.onclick = () => {
          actionsDiv.remove();
          addMessage('assistant', '已取消操作。');
        };
        
        actionsDiv.appendChild(confirmBtn);
        actionsDiv.appendChild(cancelBtn);
        contentDiv.appendChild(actionsDiv);
      }
      
      if (metadata.task_id) {
        addTaskProgress(contentDiv, metadata.task_id);
      }
      
      messageDiv.appendChild(avatar);
      messageDiv.appendChild(contentDiv);
      messagesArea.appendChild(messageDiv);
      messagesArea.scrollTop = messagesArea.scrollHeight;
      
      return contentDiv;
    }
    
    function addTaskProgress(container, taskId) {
      const progressDiv = document.createElement('div');
      progressDiv.className = 'task-progress';
      progressDiv.id = `task-${taskId}`;
      progressDiv.innerHTML = `
        <div class="progress-text">任务执行中...</div>
        <div class="progress-bar"><div class="progress-bar-fill" style="width: 0%"></div></div>
      `;
      container.appendChild(progressDiv);
      startProgressStream(taskId);
    }
    
    function startProgressStream(taskId) {
      if (eventSource) eventSource.close();
      currentTaskId = taskId;
      
      eventSource = new EventSource(`/api/stream/${taskId}`);
      eventSource.onmessage = (event) => {
        const data = JSON.parse(event.data);
        updateTaskProgress(data);
        
        if (data.status === 'completed' || data.status === 'failed') {
          eventSource.close();
          eventSource = null;
          currentTaskId = null;
          
          if (data.status === 'completed') {
            addMessage('assistant', '任务已完成！');
          } else {
            addMessage('assistant', `任务失败：${data.error || '未知错误'}`);
          }
        }
      };
      
      eventSource.onerror = () => {
        eventSource.close();
        eventSource = null;
      };
    }
    
    function updateTaskProgress(data) {
      const progressDiv = document.getElementById(`task-${data.task_id}`);
      if (!progressDiv) return;
      
      const textEl = progressDiv.querySelector('.progress-text');
      const barFill = progressDiv.querySelector('.progress-bar-fill');
      
      if (data.progress && data.progress.length > 0) {
        const latest = data.progress[data.progress.length - 1];
        textEl.textContent = latest.step + (latest.detail ? `: ${latest.detail}` : '');
        barFill.style.width = `${latest.percent || 0}%`;
      }
    }
    
    function addLoadingIndicator() {
      const messageDiv = document.createElement('div');
      messageDiv.className = 'message assistant';
      messageDiv.id = 'loadingMessage';
      
      const avatar = document.createElement('div');
      avatar.className = 'message-avatar';
      avatar.textContent = '🤖';
      
      const contentDiv = document.createElement('div');
      contentDiv.className = 'message-content';
      contentDiv.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';
      
      messageDiv.appendChild(avatar);
      messageDiv.appendChild(contentDiv);
      messagesArea.appendChild(messageDiv);
      messagesArea.scrollTop = messagesArea.scrollHeight;
    }
    
    function removeLoadingIndicator() {
      const loading = document.getElementById('loadingMessage');
      if (loading) loading.remove();
    }
    
    async function sendMessage() {
      const message = messageInput.value.trim();
      if (!message) return;
      
      addMessage('user', message);
      messageInput.value = '';
      messageInput.style.height = 'auto';
      
      sendButton.disabled = true;
      addLoadingIndicator();
      
      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({message, session_id: sessionId})
        });
        
        const data = await response.json();
        removeLoadingIndicator();
        
        if (data.session_id) sessionId = data.session_id;
        
        addMessage('assistant', data.message, {
          requires_confirmation: data.requires_confirmation,
          task_id: data.task_id,
          intent: data.intent,
        });
      } catch (error) {
        removeLoadingIndicator();
        addMessage('assistant', `请求失败：${error.message}`);
      } finally {
        sendButton.disabled = false;
        messageInput.focus();
      }
    }
    
    async function executeConfirmed() {
      if (!sessionId) {
        addMessage('assistant', '会话已过期，请重新输入需求。');
        return;
      }
      
      sendButton.disabled = true;
      addLoadingIndicator();
      
      try {
        const response = await fetch('/api/chat/execute', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({session_id: sessionId})
        });
        
        const data = await response.json();
        removeLoadingIndicator();
        
        addMessage('assistant', data.message, {
          task_id: data.task_id,
        });
      } catch (error) {
        removeLoadingIndicator();
        addMessage('assistant', `执行失败：${error.message}`);
      } finally {
        sendButton.disabled = false;
      }
    }
    
    function sendQuickAction(text) {
      messageInput.value = text;
      sendMessage();
    }
    
    messageInput.focus();
  </script>
</body>
</html>
