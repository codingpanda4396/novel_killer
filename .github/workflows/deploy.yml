name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Deploy to server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          # 统一使用 /opt/novelOps/novel_killer 路径
          APP_DIR="/opt/novelOps/novel_killer"
          
          if [ ! -d "$APP_DIR" ]; then
            sudo mkdir -p /opt/novelOps
            sudo git clone https://github.com/codingpanda4396/novel_killer.git $APP_DIR
            sudo chown -R novelops:novelops /opt/novelOps
            cd $APP_DIR
            python3 -m venv .venv
            source .venv/bin/activate
            pip install -r requirements.txt
            python -m novelops.cli index
            sudo cp deploy/novelops.service /etc/systemd/system/
            sudo systemctl daemon-reload
            sudo systemctl enable novelops
          else
            cd $APP_DIR
            sudo git pull origin main || sudo git pull origin master
            sudo chown -R novelops:novelops $APP_DIR
            source .venv/bin/activate
            pip install -r requirements.txt
          fi
          
          sudo systemctl restart novelops
          sudo systemctl reload nginx || true
          sudo systemctl status novelops --no-pager
          echo "部署完成"
