name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Deploy
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        command_timeout: 10m
        script: |
          set -ex
          echo "=== Deploy Start ==="
          
          # 确保 novelops 用户存在
          id novelops || sudo useradd -m -s /bin/bash novelops
          
          # 确保目录存在并属于 novelops
          sudo mkdir -p /opt/novelOps
          sudo chown novelops:novelops /opt/novelOps
          
          # 以 novelops 用户执行所有操作
          sudo -u novelops bash -c '
            set -ex
            APP_DIR="/opt/novelOps/novel_killer"
            
            if [ ! -d "$APP_DIR/.git" ]; then
              echo "=== 克隆代码 ==="
              cd /opt/novelOps
              git clone https://github.com/codingpanda4396/novel_killer.git
              cd novel_killer
            else
              echo "=== 更新代码 ==="
              cd $APP_DIR
              git pull origin main || git pull origin master
            fi
            
            echo "=== 安装依赖 ==="
            if [ ! -d ".venv" ]; then
              python3 -m venv .venv
            fi
            source .venv/bin/activate
            pip install -r requirements.txt
            
            echo "=== 初始化 ==="
            python -m novelops.cli index || true
            
            echo "=== 当前目录内容 ==="
            ls -la
          '
          
          echo "=== 配置服务 ==="
          sudo cp /opt/novelOps/novel_killer/deploy/novelops.service /etc/systemd/system/
          sudo systemctl daemon-reload
          sudo systemctl enable novelops
          sudo systemctl restart novelops
          sudo systemctl reload nginx || true
          
          echo "=== 服务状态 ==="
          sudo systemctl status novelops --no-pager || true
          echo "=== 部署完成 ==="
