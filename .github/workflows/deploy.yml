name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Deploy
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        command_timeout: 10m
        script: |
          set -ex
          
          # 修复代理问题 - 删除所有代理相关配置
          sudo find /etc -name "*.conf" -o -name "*.sh" 2>/dev/null | xargs sudo grep -l "proxy\|PROXY" 2>/dev/null | while read f; do
            sudo sed -i '/proxy\|PROXY/d' "$f" 2>/dev/null || true
          done
          sudo sed -i '/proxy\|PROXY/d' /etc/environment 2>/dev/null || true
          
          # 以 novelops 执行，明确取消代理
          sudo su - novelops << 'EOF'
          set -ex
          
          # 取消所有代理
          unset http_proxy https_proxy HTTP_PROXY HTTPS_PROXY ftp_proxy FTP_PROXY
          export no_proxy=*
          export NO_PROXY=*
          
          # 清除 git 代理
          git config --global --unset http.proxy || true
          git config --global --unset https.proxy || true
          git config --global http.proxy "" || true
          git config --global https.proxy "" || true
          
          # 清除环境变量中的代理
          sed -i '/proxy\|PROXY/d' ~/.bashrc ~/.profile ~/.bash_profile 2>/dev/null || true
          
          cd /opt/novelOps
          
          # 测试网络
          curl -s --connect-timeout 3 https://github.com > /dev/null && echo "网络正常" || echo "网络异常"
          
          if [ ! -d "novel_killer/.git" ]; then
            echo "克隆代码..."
            # 明确不使用代理
            env -u http_proxy -u https_proxy -u HTTP_PROXY -u HTTPS_PROXY git clone https://github.com/codingpanda4396/novel_killer.git
            cd novel_killer
          else
            echo "更新代码..."
            cd novel_killer
            env -u http_proxy -u https_proxy -u HTTP_PROXY -u HTTPS_PROXY git pull origin main || env -u http_proxy -u https_proxy git pull origin master
          fi
          
          echo "安装依赖..."
          if [ ! -d ".venv" ]; then
            python3 -m venv .venv
          fi
          source .venv/bin/activate
          pip install -r requirements.txt
          
          echo "初始化..."
          python -m novelops.cli index || true
          
          ls -la
          EOF
          
          # 配置服务
          sudo cp /opt/novelOps/novel_killer/deploy/novelops.service /etc/systemd/system/
          sudo systemctl daemon-reload
          sudo systemctl enable novelops
          sudo systemctl restart novelops
          sudo systemctl reload nginx || true
          
          echo "=== 部署完成 ==="
          sudo systemctl status novelops --no-pager
