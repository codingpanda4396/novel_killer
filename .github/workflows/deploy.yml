name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Deploy to server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        command_timeout: 5m
        script: |
          set -ex
          echo "=== 开始部署 ==="
          
          APP_DIR="/opt/novelOps/novel_killer"
          
          # 首次部署
          if [ ! -d "$APP_DIR" ]; then
            echo "=== 克隆代码 ==="
            sudo mkdir -p /opt/novelOps
            sudo git clone https://github.com/codingpanda4396/novel_killer.git $APP_DIR
            
            echo "=== 安装依赖 ==="
            cd $APP_DIR
            sudo chown -R novelops:novelops $APP_DIR
            sudo -u novelops python3 -m venv .venv
            sudo -u novelops bash -c "source .venv/bin/activate && pip install -r requirements.txt"
            sudo -u novelops bash -c "source .venv/bin/activate && python -m novelops.cli index"
            
            echo "=== 配置服务 ==="
            sudo cp $APP_DIR/deploy/novelops.service /etc/systemd/system/
            sudo systemctl daemon-reload
            sudo systemctl enable novelops
          else
            echo "=== 更新代码 ==="
            cd $APP_DIR
            sudo -u novelops git pull origin main || sudo -u novelops git pull origin master
            sudo -u novelops bash -c "source .venv/bin/activate && pip install -r requirements.txt"
          fi
          
          echo "=== 重启服务 ==="
          sudo systemctl restart novelops || true
          sudo systemctl reload nginx || true
          sudo systemctl status novelops --no-pager || true
          
          echo "=== 部署完成 ==="
          ls -la $APP_DIR
