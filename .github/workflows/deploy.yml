name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Deploy to server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          # 如果目录不存在就克隆
          if [ ! -d "/opt/novelops" ]; then
            sudo git clone https://github.com/codingpanda4396/novel_killer.git /opt/novelops
            sudo chown -R novelops:novelops /opt/novelops
            cd /opt/novelops
            python3 -m venv .venv
            source .venv/bin/activate
            pip install -r requirements.txt
            python -m novelops.cli index
            sudo cp deploy/novelops.service /etc/systemd/system/
            sudo systemctl daemon-reload
            sudo systemctl enable novelops
          else
            cd /opt/novelops
            sudo git pull origin main || sudo git pull origin master
            sudo chown -R novelops:novelops /opt/novelops
            source .venv/bin/activate
            pip install -r requirements.txt
          fi
          
          sudo systemctl restart novelops
          sudo systemctl reload nginx || true
          echo "部署完成"
