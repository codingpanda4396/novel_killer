name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Deploy
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        command_timeout: 15m
        script: |
          set -ex
          unset http_proxy https_proxy HTTP_PROXY HTTPS_PROXY
          
          sudo su - novelops << 'EOF'
          set -ex
          unset http_proxy https_proxy HTTP_PROXY HTTPS_PROXY
          
          cd /opt/novelOps
          
          # 更新代码
          if [ ! -d "novel_killer/.git" ]; then
            echo "克隆代码..."
            env -i HOME=$HOME PATH=$PATH git clone https://github.com/codingpanda4396/novel_killer.git
            cd novel_killer
          else
            echo "更新代码..."
            cd novel_killer
            env -i HOME=$HOME PATH=$PATH git pull origin main || env -i HOME=$HOME PATH=$PATH git pull origin master
          fi
          
          # 确保虚拟环境使用 Python 3.10
          if [ -d ".venv" ]; then
            # 检查当前 venv Python 版本
            VENV_PYTHON_VER=$(.venv/bin/python3 --version 2>&1 | cut -d' ' -f2 | cut -d'.' -f1,2)
            if [ "$(echo "$VENV_PYTHON_VER < 3.7" | bc)" -eq 1 ]; then
              echo "重建虚拟环境 (Python 3.10)..."
              rm -rf .venv
            fi
          fi
          
          if [ ! -d ".venv" ]; then
            echo "创建 Python 3.10 虚拟环境..."
            python3.10 -m venv .venv
          fi
          
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          
          python -m novelops.cli index || true
          
          echo "部署完成"
          ls -la
          EOF
          
          # 确保 service 文件使用 python3.10
          sudo sed -i 's|/opt/novelOps/novel_killer/.venv/bin/python3 |/opt/novelOps/novel_killer/.venv/bin/python3.10 |g' /etc/systemd/system/novelops.service
          sudo sed -i 's|/opt/novelOps/novel_killer/.venv/bin/python3$|/opt/novelOps/novel_killer/.venv/bin/python3.10|g' /etc/systemd/system/novelops.service
          
          sudo systemctl daemon-reload
          sudo systemctl restart novelops
          sudo systemctl reload nginx || true
          
          echo "=== 部署完成 ==="
          sudo systemctl status novelops --no-pager
