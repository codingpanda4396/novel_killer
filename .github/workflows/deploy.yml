name: Deploy to Production

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Deploy to server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        envs: DEEPSEEK_API_KEY,RIGHTCODE_API_KEY
        script: |
          set -e
          
          # 检查是否需要首次部署
          if [ ! -d "/opt/novelops" ]; then
            echo "=== 首次部署，正在初始化 ==="
            
            # 安装系统依赖
            sudo apt update -y
            sudo apt install -y python3 python3-pip python3-venv nginx git
            
            # 创建 novelops 用户（如果不存在）
            if ! id -u novelops > /dev/null 2>&1; then
              sudo useradd -m -s /bin/bash novelops
            fi
            
            # 克隆代码
            sudo git clone https://github.com/codingpanda4396/novel_killer.git /opt/novelops
            sudo chown -R novelops:novelops /opt/novelops
            
            # 切换到应用目录
            cd /opt/novelops
            
            # 创建虚拟环境并安装依赖
            python3 -m venv .venv
            source .venv/bin/activate
            pip install -r requirements.txt
            
            # 初始化索引
            python -m novelops.cli index
            
            # 配置 systemd 服务
            sudo cp deploy/novelops.service /etc/systemd/system/
            
            # 替换 API Key（如果提供了）
            if [ -n "$DEEPSEEK_API_KEY" ]; then
              sudo sed -i "s|your_deepseek_api_key_here|$DEEPSEEK_API_KEY|g" /etc/systemd/system/novelops.service
            fi
            if [ -n "$RIGHTCODE_API_KEY" ]; then
              sudo sed -i "s|your_rightcode_api_key_here|$RIGHTCODE_API_KEY|g" /etc/systemd/system/novelops.service
            fi
            
            # 重载 systemd 并启动服务
            sudo systemctl daemon-reload
            sudo systemctl enable novelops
            sudo systemctl start novelops
            
            # 配置 nginx（如果需要）
            if [ -f "deploy/nginx.conf" ]; then
              sudo cp deploy/nginx.conf /etc/nginx/sites-available/novelops 2>/dev/null || true
              sudo ln -sf /etc/nginx/sites-available/novelops /etc/nginx/sites-enabled/ 2>/dev/null || true
              sudo nginx -t && sudo systemctl reload nginx || true
            fi
            
            echo "=== 首次部署完成 ==="
            
          else
            echo "=== 更新部署 ==="
            
            cd /opt/novelops
            
            # 停止服务
            sudo systemctl stop novelops || true
            
            # 拉取最新代码
            sudo git pull origin main || sudo git pull origin master
            sudo chown -R novelops:novelops /opt/novelops
            
            # 更新依赖
            source .venv/bin/activate
            pip install -r requirements.txt
            
            # 重建索引
            python -m novelops.cli index
            
            # 重启服务
            sudo systemctl start novelops
            sudo systemctl reload nginx || true
            
            echo "=== 更新部署完成 ==="
          fi
          
          # 检查服务状态
          sudo systemctl status novelops --no-pager || true
