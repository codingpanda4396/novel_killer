name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Deploy
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        command_timeout: 15m
        script: |
          set -ex
          unset http_proxy https_proxy HTTP_PROXY HTTPS_PROXY
          
          sudo su - novelops << 'EOF'
          set -ex
          unset http_proxy https_proxy HTTP_PROXY HTTPS_PROXY
          
          cd /opt/novelOps
          
          # 更新代码
          if [ ! -d "novel_killer/.git" ]; then
            echo "克隆代码..."
            env -i HOME=$HOME PATH=$PATH git clone https://github.com/codingpanda4396/novel_killer.git
            cd novel_killer
          else
            echo "更新代码..."
            cd novel_killer
            env -i HOME=$HOME PATH=$PATH git pull origin main || env -i HOME=$HOME PATH=$PATH git pull origin master
          fi
          
          # 检查并安装 Python 3.10
          if ! command -v python3.10 &> /dev/null; then
            echo "安装 Python 3.10..."
            sudo dnf install -y python3.10 python3.10-pip || sudo dnf install -y python310
          fi
          
          # 删除旧的虚拟环境，用 Python 3.10 重建
          if [ -d ".venv" ]; then
            rm -rf .venv
          fi
          
          echo "创建虚拟环境..."
          python3.10 -m venv .venv
          
          source .venv/bin/activate
          
          # 升级 pip
          pip install --upgrade pip
          
          # 安装依赖
          echo "安装依赖..."
          pip install -r requirements.txt
          
          # 初始化
          python -m novelops.cli index || true
          
          echo "部署完成"
          ls -la
          EOF
          
          # 更新 systemd service 使用新的 Python 路径
          sudo sed -i 's|/opt/novelOps/novel_killer/.venv/bin/python3|/opt/novelOps/novel_killer/.venv/bin/python3.10|g' /etc/systemd/system/novelops.service
          
          sudo systemctl daemon-reload
          sudo systemctl restart novelops
          sudo systemctl reload nginx || true
          
          echo "=== 部署完成 ==="
          sudo systemctl status novelops --no-pager
