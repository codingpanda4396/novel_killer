name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python3.10 -m pip install --upgrade pip
          python3.10 -m pip install -r requirements.txt

      - name: Run tests
        run: python3.10 -m unittest discover -s tests

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - name: Deploy to server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        command_timeout: 15m
        script: |
          set -ex
          unset http_proxy https_proxy HTTP_PROXY HTTPS_PROXY
          
          sudo su - novelops << 'EOF'
          set -ex
          unset http_proxy https_proxy HTTP_PROXY HTTPS_PROXY
          
          DEPLOY_DIR="/opt/novelOps/novel_killer"
          
          # 确保目录存在
          if [ ! -d "/opt/novelOps" ]; then
            sudo mkdir -p /opt/novelOps
            sudo chown novelops:novelops /opt/novelOps
          fi
          
          cd /opt/novelOps
          
          # 更新代码
          if [ ! -d "novel_killer/.git" ]; then
            echo "克隆代码..."
            git clone https://github.com/codingpanda4396/novel_killer.git
            cd novel_killer
          else
            echo "更新代码..."
            cd novel_killer
            git pull origin main || git pull origin master
          fi
          
          # 用 python3.10 创建虚拟环境
          if [ -d ".venv" ]; then
            echo "备份当前环境..."
            cp -r .venv .venv.backup.$(date +%Y%m%d_%H%M%S) || true
            rm -rf .venv
          fi
          python3.10 -m venv .venv
          
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          
          # 创建 .env 文件（如果不存在）
          if [ ! -f ".env" ]; then
            echo "创建 .env 文件..."
            cp .env.example .env
            echo "警告: 请手动编辑 .env 文件填入 API keys"
          fi
          
          # 运行迁移和索引
          python3.10 -m novelops.migrate_to_multi_project || true
          python3.10 -m novelops.cli index || true
          
          echo "部署完成"
          EOF
          
          # 更新 service 文件并重启服务
          sudo cp /opt/novelOps/novel_killer/deploy/novelops.service /etc/systemd/system/novelops.service
          
          # 更新 service 中的 API keys（如果存在 secrets）
          if [ -n "${{ secrets.DEEPSEEK_API_KEY }}" ]; then
            sudo sed -i 's|your_deepseek_api_key_here|${{ secrets.DEEPSEEK_API_KEY }}|g' /etc/systemd/system/novelops.service
          fi
          if [ -n "${{ secrets.RIGHTCODE_API_KEY }}" ]; then
            sudo sed -i 's|your_rightcode_api_key_here|${{ secrets.RIGHTCODE_API_KEY }}|g' /etc/systemd/system/novelops.service
          fi
          
          sudo systemctl daemon-reload
          sudo systemctl restart novelops
          sudo systemctl reload nginx || true
          
          echo "=== 部署完成 ==="
          sudo systemctl status novelops --no-pager
