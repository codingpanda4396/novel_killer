name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Deploy
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        command_timeout: 15m
        script: |
          set -ex
          unset http_proxy https_proxy HTTP_PROXY HTTPS_PROXY
          
          sudo su - novelops << 'EOF'
          set -ex
          unset http_proxy https_proxy HTTP_PROXY HTTPS_PROXY
          
          cd /opt/novelOps
          
          # 更新代码
          if [ ! -d "novel_killer/.git" ]; then
            echo "克隆代码..."
            git clone https://github.com/codingpanda4396/novel_killer.git
            cd novel_killer
          else
            echo "更新代码..."
            cd novel_killer
            git pull origin main || git pull origin master
          fi
          
          # 用 python3.10 创建虚拟环境
          if [ -d ".venv" ]; then
            rm -rf .venv
          fi
          python3.10 -m venv .venv
          
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

          python -m novelops.migrate_to_multi_project || true
          python -m novelops.cli index || true

          echo "部署完成"
          ls -la
          EOF
          
          # 更新 service 文件使用 python3.10
          sudo cp /opt/novelOps/novel_killer/deploy/novelops.service /etc/systemd/system/novelops.service
          sudo sed -i 's|/opt/novelOps/novel_killer/.venv/bin/python3 |/opt/novelOps/novel_killer/.venv/bin/python3.10 |g' /etc/systemd/system/novelops.service
          sudo sed -i 's|ExecStart=.*|ExecStart=/opt/novelOps/novel_killer/.venv/bin/python3.10 -m novelops.cli serve --host 127.0.0.1 --port 8787|g' /etc/systemd/system/novelops.service
          
          sudo systemctl daemon-reload
          sudo systemctl restart novelops
          sudo systemctl reload nginx || true
          
          echo "=== 部署完成 ==="
          sudo systemctl status novelops --no-pager
