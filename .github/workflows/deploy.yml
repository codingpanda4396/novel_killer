name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Deploy
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        command_timeout: 10m
        script: |
          set -ex
          
          # 暴力清除所有系统级代理配置
          echo "=== 清除代理配置 ==="
          sudo find /etc -type f \( -name "*.conf" -o -name "*.sh" -o -name "*.bashrc" \) 2>/dev/null | while read f; do
            sudo grep -q "proxy\|PROXY" "$f" 2>/dev/null && sudo sed -i '/proxy\|PROXY/d' "$f" 2>/dev/null || true
          done
          sudo sed -i '/proxy\|PROXY/d' /etc/environment 2>/dev/null || true
          sudo rm -f /etc/profile.d/*proxy* 2>/dev/null || true
          
          # 以 novelops 执行
          sudo su - novelops << 'EOF'
          set -ex
          
          # 清除用户级代理
          unset http_proxy https_proxy HTTP_PROXY HTTPS_PROXY ftp_proxy FTP_PROXY
          export no_proxy=*
          export NO_PROXY=*
          
          # 清除 .bashrc .profile 中的代理
          sed -i '/proxy\|PROXY/d' ~/.bashrc ~/.profile ~/.bash_profile 2>/dev/null || true
          
          # 清除 git 代理
          git config --global --unset-all http.proxy 2>/dev/null || true
          git config --global --unset-all https.proxy 2>/dev/null || true
          
          # 验证代理已清除
          echo "当前环境变量:"
          env | grep -i proxy || echo "无代理设置"
          
          cd /opt/novelOps
          
          # 使用 env -i 清除所有继承的环境变量
          if [ ! -d "novel_killer/.git" ]; then
            echo "克隆代码..."
            env -i HOME=$HOME PATH=/usr/local/bin:/usr/bin:/bin git clone https://github.com/codingpanda4396/novel_killer.git
            cd novel_killer
          else
            echo "更新代码..."
            cd novel_killer
            env -i HOME=$HOME PATH=/usr/local/bin:/usr/bin:/bin git pull origin main || env -i HOME=$HOME PATH=/usr/local/bin:/usr/bin:/bin git pull origin master
          fi
          
          echo "安装依赖..."
          if [ ! -d ".venv" ]; then
            python3 -m venv .venv
          fi
          source .venv/bin/activate
          pip install -r requirements.txt
          
          python -m novelops.cli index || true
          
          ls -la
          EOF
          
          # 配置服务
          sudo cp /opt/novelOps/novel_killer/deploy/novelops.service /etc/systemd/system/
          sudo systemctl daemon-reload
          sudo systemctl enable novelops
          sudo systemctl restart novelops
          sudo systemctl reload nginx || true
          
          echo "=== 部署完成 ==="
          sudo systemctl status novelops --no-pager
